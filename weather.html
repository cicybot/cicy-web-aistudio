<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Dashboard | Generated by CiCy</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="bg-[#050505] text-slate-50 min-h-screen p-4 md:p-8 font-sans selection:bg-emerald-500/30">
    <div class="max-w-5xl mx-auto space-y-8">
      <!-- Header -->
      <header class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
          <div class="flex items-center gap-2 text-emerald-400 text-sm font-mono mb-2">
            <i data-lucide="zap" class="w-4 h-4"></i> Generated by CiCy
          </div>
          <h1 class="text-4xl font-bold tracking-tight">Weather</h1>
          <p class="text-slate-400 mt-1" id="location-text">Loading location...</p>
        </div>
        <div class="flex items-center gap-2 w-full md:w-auto">
           <div class="relative w-full md:w-64">
             <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
             <input type="text" id="search-input" placeholder="Search city..." class="w-full bg-white/5 border border-white/10 rounded-xl pl-10 pr-4 py-3 text-sm focus:outline-none focus:border-emerald-500/50 focus:bg-white/10 transition-all placeholder:text-slate-500" />
           </div>
           <button id="search-btn" class="bg-emerald-500 hover:bg-emerald-400 text-black px-6 py-3 rounded-xl font-medium transition-colors whitespace-nowrap">
             Search
           </button>
        </div>
      </header>

      <main class="grid grid-cols-1 lg:grid-cols-3 gap-6" id="dashboard-content">
        <!-- Current Weather -->
        <div class="lg:col-span-2 bg-gradient-to-br from-slate-900 to-black border border-white/10 rounded-[2rem] p-8 md:p-10 relative overflow-hidden shadow-2xl">
          <!-- Decorative background glow -->
          <div class="absolute -top-24 -right-24 w-96 h-96 bg-emerald-500/20 rounded-full blur-3xl pointer-events-none"></div>
          
          <div class="relative z-10">
            <div class="flex items-center justify-between mb-8">
              <div class="flex items-center gap-2 text-emerald-400 font-medium bg-emerald-500/10 px-4 py-2 rounded-full border border-emerald-500/20">
                <i data-lucide="map-pin" class="w-4 h-4"></i>
                <span id="current-location">San Francisco, US</span>
              </div>
              <i data-lucide="sun" class="w-12 h-12 text-emerald-400" id="current-icon"></i>
            </div>
            
            <div class="flex flex-col md:flex-row md:items-end gap-4 md:gap-8 mb-10">
              <span class="text-8xl md:text-[120px] font-bold tracking-tighter leading-none" id="current-temp">--°</span>
              <span class="text-2xl md:text-3xl text-slate-400 mb-2 md:mb-6 font-medium" id="current-condition">Loading...</span>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div class="bg-white/5 rounded-2xl p-5 border border-white/5 backdrop-blur-sm">
                <div class="text-slate-400 text-sm mb-2 flex items-center gap-2"><i data-lucide="wind" class="w-4 h-4"></i> Wind Speed</div>
                <div class="text-2xl font-semibold" id="current-wind">-- km/h</div>
              </div>
              <div class="bg-white/5 rounded-2xl p-5 border border-white/5 backdrop-blur-sm">
                <div class="text-slate-400 text-sm mb-2 flex items-center gap-2"><i data-lucide="droplets" class="w-4 h-4"></i> Humidity</div>
                <div class="text-2xl font-semibold" id="current-humidity">--%</div>
              </div>
              <div class="bg-white/5 rounded-2xl p-5 border border-white/5 backdrop-blur-sm">
                <div class="text-slate-400 text-sm mb-2 flex items-center gap-2"><i data-lucide="thermometer" class="w-4 h-4"></i> Feels like</div>
                <div class="text-2xl font-semibold" id="current-feels-like">--°</div>
              </div>
            </div>
          </div>
        </div>

        <!-- 7 Day Forecast -->
        <div class="bg-white/5 border border-white/10 rounded-[2rem] p-8 flex flex-col">
          <h3 class="text-xl font-semibold mb-6 flex items-center gap-2">
            <i data-lucide="calendar" class="w-5 h-5 text-emerald-400"></i>
            7-Day Forecast
          </h3>
          <div class="space-y-2 flex-1 flex flex-col justify-between" id="forecast-list">
            <!-- Skeleton loader -->
            <div class="animate-pulse space-y-4">
              <div class="h-12 bg-white/5 rounded-xl"></div>
              <div class="h-12 bg-white/5 rounded-xl"></div>
              <div class="h-12 bg-white/5 rounded-xl"></div>
              <div class="h-12 bg-white/5 rounded-xl"></div>
              <div class="h-12 bg-white/5 rounded-xl"></div>
            </div>
          </div>
        </div>
      </main>
    </div>
    
    <!-- Back to home -->
    <a href="/" class="fixed bottom-6 right-6 bg-white/10 hover:bg-white/20 backdrop-blur-md text-white px-5 py-3 rounded-full text-sm font-medium flex items-center gap-2 transition-all border border-white/10 shadow-2xl hover:scale-105">
      <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to CiCy OS
    </a>

    <script type="module" src="/src/weather.ts"></script>
  </body>
</html>
